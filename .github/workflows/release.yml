name: Build And Publish Dist

on:
  push:
    branches:
      - main
  workflow_dispatch:
    inputs:
      base_url:
        description: "Base URL used by the build action"
        required: false
        default: "https://cdn.jsdelivr.net/gh/jerrykuku/ZimaOS-AppStore@gh-pages"

permissions:
  contents: write

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Restore build caches
        uses: actions/cache@v4
        with:
          path: |
            .cache/build_appstore/image-size-cache.json
            .cache/build_appstore/image-digest-cache.json
          key: build-appstore-image-size-cache-${{ github.ref_name }}
          restore-keys: |
            build-appstore-image-size-cache-

      - name: Build static appstore dist via GitHub Action
        uses: IceWhaleTech/build-appstore-action@v1
        with:
          source: .
          output: dist
          base-url: ${{ inputs.base_url }}
          cache-file: .cache/build_appstore/image-size-cache.json
          digest-cache-file: .cache/build_appstore/image-digest-cache.json

      - name: Disable Jekyll
        run: |
          touch dist/.nojekyll

      - name: Build legacy v1 appstore zip
        run: |
          set -euo pipefail
          rm -rf /tmp/appstore-v1
          mkdir -p /tmp/appstore-v1/build/sysroot/var/lib/casaos/appstore/default.new
          cp -rv build/* /tmp/appstore-v1/build/
          cp -rv Apps /tmp/appstore-v1/build/sysroot/var/lib/casaos/appstore/default.new/
          cp -v category-list.json /tmp/appstore-v1/build/sysroot/var/lib/casaos/appstore/default.new/
          cp -v featured-apps.json /tmp/appstore-v1/build/sysroot/var/lib/casaos/appstore/default.new/
          cp -v recommend-list.json /tmp/appstore-v1/build/sysroot/var/lib/casaos/appstore/default.new/
          cp -v README.md /tmp/appstore-v1/build/sysroot/var/lib/casaos/appstore/default.new/
          find /tmp/appstore-v1/build -type f -not \( \
            -name '*.yaml' -or \
            -name '*.yml' -or \
            -name 'category-list.json' -or \
            -name 'featured-apps.json' -or \
            -name 'recommend-list.json' -or \
            -name 'README.md' -or \
            -name '*.sh' \
          \) -delete
          mkdir -p dist/store
          (cd /tmp/appstore-v1 && zip -r "${GITHUB_WORKSPACE}/dist/store/main.zip" build)
          unzip -t dist/store/main.zip

      - name: Deploy dist to gh-pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_branch: gh-pages
          publish_dir: ./dist

      - name: Refresh jsDelivr cache
        run: |
          curl -fsSL "https://purge.jsdelivr.net/gh/${{ github.repository }}@gh-pages/index.json" || true
          curl -fsSL "https://purge.jsdelivr.net/gh/${{ github.repository }}@gh-pages/store/main.zip" || true
