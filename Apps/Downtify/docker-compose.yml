name: downtify
services:
  downtify:
    environment:
      PGID: $PGID
      PUID: $PUID
      TZ: $TZ
    image: ghcr.io/henriquesebastiao/downtify:1.1.1
    deploy:
      resources:
        reservations:
          memory: "2048M"
    ports:
      - target: 8000
        published: "8582"
        protocol: tcp
    restart: unless-stopped
    volumes:
      - type: bind
        source: /DATA/Downloads/downtify
        target: /downloads
    x-casaos:
      envs:
        - container: PUID
          description:
            en_US: for UserID
        - container: PGID
          description:
            en_US: for GroupID
        - container: TZ
          description:
            en_US: specify a timezone to use, see this list.
      volumes:
        - container: /downloads
          description:
            en_US: Directory where the files will be saved.
    container_name: downtify
x-casaos:
  architectures:
    - amd64
    - arm64
  main: downtify
  author: Henrique Sebastião
  category: Media
  description:
    en_US: |
      With Downtify you can download Spotify musics containing album art, track names, album title and other metadata about the songs. Just copy the Spotify link, whether it's a single song, an album, etc. As soon as your downloads are complete you will be notified!
    pt_BR: |
      Com o Downtify você pode baixar músicas do Spotify contendo capas de álbuns, nomes de faixas, títulos de álbuns e outros metadados sobre as músicas. Basta copiar o link do Spotify, seja uma música única, um álbum, etc. Assim que seus downloads forem concluídos, você será notificado!
  developer: Henrique Sebastião
  icon: https://raw.githubusercontent.com/henriquesebastiao/downtify/refs/heads/main/assets/casaos-icon.png
  screenshot_link:
    - https://raw.githubusercontent.com/henriquesebastiao/downtify/refs/heads/main/assets/screenshot-1.png
    - https://raw.githubusercontent.com/henriquesebastiao/downtify/refs/heads/main/assets/screenshot-2.png
  tagline:
    en_US: Download Spotify music with album art and metadata
    pt_BR: Baixe músicas do Spotify com a capa do álbum e metadados
  title:
    en_US: Downtify
  index: /
  port_map: "8582"
  version: "2.6.0"
  updateAt: "2026-05-03"
  releaseNotes:
    en_US: |-
      - 2.6.0 adds the option to save music into artist folders.
      - It adds a setting to disable lyric downloads.
      - It fixes download history clearing and settings persistence.
    en_GB: |-
      - 2.6.0 adds the option to save music into artist folders.
      - It adds a setting to disable lyric downloads.
      - It fixes download history clearing and settings persistence.
    it_IT: |-
      - 2.6.0 aggiunge l'opzione per salvare la musica nelle cartelle degli artisti.
      - Aggiunge un'impostazione per disabilitare i download dei testi.
      - Corregge la cancellazione della cronologia dei download e la persistenza delle impostazioni.
    nb_NO: |-
      - 2.6.0 legger til muligheten for å lagre musikk i artistmapper.
      - Den legger til en innstilling for å deaktivere tekstnedlastinger.
      - Det fikser nedlastingshistorikk og utholdenhet av innstillinger.
    zh_CN: |-
      - 2.6.0 增加了将音乐保存到 artist folders 的选项。
      - 增加了禁用 lyric downloads 的设置。
      - 修复了 download history 清理和 settings persistence。
    ja_JP: |-
      - 2.6.0 は音楽を artist folders に保存するオプションを追加します。
      - lyric downloads を無効化する設定が追加されました。
      - download history のクリアと settings persistence が修正されました。
    ko_KR: |-
      - 2.6.0은 음악을 artist folders에 저장하는 옵션을 추가합니다.
      - lyric downloads를 비활성화하는 설정이 추가되었습니다.
      - download history 지우기와 settings persistence가 수정되었습니다.
    fr_FR: |-
      - 2.6.0 ajoute l'option d'enregistrer la musique dans des artist folders.
      - Un parametre permettant de desactiver lyric downloads a ete ajoute.
      - Le nettoyage de download history et settings persistence ont ete corriges.
    de_DE: |-
      - 2.6.0 fuegt die Option hinzu, Musik in Artist-Foldern zu speichern.
      - Eine Einstellung zum Deaktivieren von lyric downloads wurde hinzugefuegt.
      - Download-history-Loeschung und settings persistence wurden korrigiert.
    sv_SE: |-
      - 2.6.0 lägger till alternativet att spara musik i artistmappar.
      - Det lägger till en inställning för att inaktivera nedladdning av låttexter.
      - Det fixar nedladdningshistoriken och inställningarnas beständighet.
    el_GR: |-
      - Το 2.6.0 προσθέτει την επιλογή αποθήκευσης μουσικής σε φακέλους καλλιτεχνών.
      - Προσθέτει μια ρύθμιση για την απενεργοποίηση των λήψεων στίχων.
      - Διορθώνει την εκκαθάριση ιστορικού λήψεων και τη διατήρηση των ρυθμίσεων.
    hr_HR: |-
      - 2.6.0 dodaje opciju spremanja glazbe u mape izvođača.
      - Dodaje postavku za onemogućavanje preuzimanja pjesama.
      - Popravlja brisanje povijesti preuzimanja i postojanost postavki.
    pt_PT: |-
      - 2.6.0 adiciona a opção de guardar música em pastas de artistas.
      - Adiciona uma definição para desativar o download de letras.
      - Corrige a limpeza do histórico de downloads e a persistência das definições.
    ru_RU: |-
      - 2.6.0 добавляет возможность сохранять музыку в папки исполнителей.
      - Добавлена ​​настройка для отключения загрузки текстов песен.
      - Исправлена ​​очистка истории загрузок и сохранение настроек.
    tr_TR: |-
      - 2.6.0 müziği sanatçı klasörlerine kaydetme seçeneğini ekler.
      - Şarkı sözü indirmelerini devre dışı bırakmak için bir ayar ekler.
      - İndirme geçmişinin temizlenmesini ve ayarların kalıcılığını düzeltir.
  website: "https://downtify.henriquesebastiao.com"
  repo: "https://github.com/henriquesebastiao/downtify"
  support: "https://github.com/henriquesebastiao/downtify/issues"
  docs: "https://github.com/henriquesebastiao/downtify#readme"
