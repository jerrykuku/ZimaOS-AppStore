name: logseq
services:
  logseq:
    environment:
      PGID: "0"
      PUID: "0"
    image: correctroad/logseq:v0.10.10
    deploy:
      resources:
        reservations:
          memory: 64M
    network_mode: bridge
    ports:
      - target: 3000
        published: "3325"
        protocol: tcp   
      - target: 12315
        published: "12315"
        protocol: tcp
    privileged: true
    restart: unless-stopped
    volumes:
      - type: bind
        source: /DATA/AppData/logseq/config
        target: /config
      - type: bind
        source: /DATA/Documents/Notes
        target: /notes
    x-casaos:
      ports:
        - container: "3325"
          description:
            en_US: ""
      volumes:
        - container: /config
          description:
            en_US: ""
        - container: /notes
          description:
            en_US: ""
    container_name: logseq
x-casaos:
  architectures:
    - amd64
    - arm64
  main: logseq
  author: CasaOS Team
  category: Productivity
  description:
    en_US: A privacy-first, open-source platform for knowledge management and collaboration.
    zh_CN: A privacy-first, open-source platform for knowledge management and collaboration.
  developer: Logseq  Team
  icon: https://cdn.jsdelivr.net/gh/jerrykuku/ZimaOS-AppStore@main/Apps/Logseq/icon.svg
  screenshot_link:
    - https://cdn.jsdelivr.net/gh/jerrykuku/ZimaOS-AppStore@main/Apps/Logseq/screenshot-1.png
    - https://cdn.jsdelivr.net/gh/jerrykuku/ZimaOS-AppStore@main/Apps/Logseq/screenshot-2.png
    - https://cdn.jsdelivr.net/gh/jerrykuku/ZimaOS-AppStore@main/Apps/Logseq/screenshot-3.png
    - https://cdn.jsdelivr.net/gh/jerrykuku/ZimaOS-AppStore@main/Apps/Logseq/screenshot-4.png
  tagline:
    en_US: A privacy-first, open-source platform for knowledge management and collaboration.
    zh_CN: A privacy-first, open-source platform for knowledge management and collaboration.
  thumbnail: https://cdn.jsdelivr.net/gh/jerrykuku/ZimaOS-AppStore@main/Apps/Logseq/thumbnail.png
  tips: {}
  title:
    en_US: Logseq
  port_map: "3325"
  version: "v0.10.10"
  # 应用更新日期，对应前端显示的更新日期信息 （可选)
  updateAt: ""
  # 应用版本更新日志，对应前端显示的版本更新日志信息，支持多语言 （可选）
