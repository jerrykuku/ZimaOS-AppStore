  description:
    en_US: |
      NetBird combines a WireGuardВ®-based overlay network with Zero Trust Network Access, providing a unified open source platform for reliable and secure connectivity.

      - Secure Remote Access вҖ“ Enable least privilege network access in a few clicks
      - Zero-Config Deployment вҖ“ Replace legacy VPNs with a peer-to-peer WireGuardВ®-based network
      - Seamless SSO with MFA вҖ“ Secure your network access with session-based SSO & MFA
      - Dynamic Posture Checks вҖ“ Grant access only to devices meeting your security rules
      - Centralized Network Management вҖ“ Control your private network from a single place
      - Detailed Activity Logging вҖ“ Identify who did what, and when in your network

      **Learn More:**
      - [NetBird Website](https://netbird.io)
      - [Documentation](https://docs.netbird.io)
      - [Self-Hosting Guide](https://docs.netbird.io/selfhosted/selfhosted-quickstart)
      - [NetBird GitHub](https://github.com/netbirdio/netbird)
      - [Slack Community](https://docs.netbird.io/slack-url)
    en_GB: |
