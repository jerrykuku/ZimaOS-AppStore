name: audiobookshelf
services:
  audiobookshelf:
    image: ghcr.io/advplyr/audiobookshelf:2.30.0
    container_name: audiobookshelf
    deploy:
      resources:
        reservations:
          memory: 64M
    restart: unless-stopped
    volumes:
    - /DATA/Media/Audiobooks:/audiobooks
    - /DATA/Media/Podcasts:/podcasts
    - /DATA/AppData/$AppID/config:/config
    - /DATA/AppData/$AppID/metadata:/metadata
    ports:
    - 13378:80
x-casaos:
  main: audiobookshelf
  icon: https://cdn.jsdelivr.net/gh/IceWhaleTech/CasaOS-AppStore@main/Apps/Audiobookshelf/icon.png
  scheme: http
  port_map: '13378'
  index: /
  title:
    en_US: Audiobookshelf
