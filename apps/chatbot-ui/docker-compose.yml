name: chatbot-ui
services:
  chatbot-ui:
    environment:
      PGID: $PGID
      PUID: $PUID
      TZ: $TZ
    image: ghcr.io/mckaywrigley/chatbot-ui:main
    network_mode: bridge
    ports:
    - target: 3000
      published: '3080'
      protocol: tcp
    restart: unless-stopped
    container_name: chatbot-ui
x-casaos:
  main: chatbot-ui
  icon: https://cdn.jsdelivr.net/gh/jerrykuku/ZimaOS-AppStore@gh-pages/apps/chatbot-ui/assets/icon.jpg
  title: Chatbot UI
  index: /
  port_map: '3080'
