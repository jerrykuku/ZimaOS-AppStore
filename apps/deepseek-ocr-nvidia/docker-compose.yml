name: deepseek-ocr-nvidia
services:
  deepseek-ocr-backend:
    image: icewhaletech/deepseek-ocr-backend:v2.2.0
    container_name: deepseek-ocr-backend
    environment:
      API_HOST: 0.0.0.0
      API_PORT: '8000'
      FRONTEND_PORT: '3000'
      MODEL_NAME: deepseek-ai/DeepSeek-OCR
      HF_HOME: /models
      MAX_UPLOAD_SIZE_MB: '100'
      BASE_SIZE: '1024'
      IMAGE_SIZE: '640'
      CROP_MODE: 'true'
    volumes:
    - /DATA/AppData/$AppID/models:/models
    deploy:
      resources:
        reservations:
          devices:
          - driver: nvidia
            count: all
            capabilities:
            - gpu
          memory: 8G
    shm_size: 4g
    ports:
    - target: 8000
      published: '22523'
      protocol: tcp
    networks:
    - deepseek-ocr-network
  deepseek-ocr-frontend:
    image: icewhaletech/deepseek-ocr-frontend:v2.2.0
    container_name: deepseek-ocr-frontend
    ports:
    - target: 80
      published: '23000'
      protocol: tcp
    deploy:
      resources:
        reservations:
          memory: 512M
    depends_on:
    - deepseek-ocr-backend
    networks:
    - deepseek-ocr-network
networks:
  deepseek-ocr-network:
    driver: bridge
x-casaos:
  icon: https://cdn.jsdelivr.net/gh/jerrykuku/ZimaOS-AppStore@gh-pages/apps/deepseek-ocr-nvidia/assets/icon.svg
  index: /
  main: deepseek-ocr-frontend
  port_map: '23000'
  scheme: http
  title: DeepSeek OCR(Nvidia GPU)
