name: downtify
services:
  downtify:
    environment:
      PGID: $PGID
      PUID: $PUID
      TZ: $TZ
    image: ghcr.io/henriquesebastiao/downtify:1.1.1
    deploy:
      resources:
        reservations:
          memory: 2048M
    ports:
    - target: 8000
      published: '8582'
      protocol: tcp
    restart: unless-stopped
    volumes:
    - type: bind
      source: /DATA/Downloads/downtify
      target: /downloads
    container_name: downtify
x-casaos:
  main: downtify
  icon: https://raw.githubusercontent.com/henriquesebastiao/downtify/refs/heads/main/assets/casaos-icon.png
  title:
    en_US: Downtify
  index: /
  port_map: '8582'
