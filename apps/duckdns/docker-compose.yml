name: duckdns
services:
  duckdns:
    image: lscr.io/linuxserver/duckdns@sha256:26d7df2d60ac4dc1585f4ef9fee17b4fb4a515f84a5c9703c906dbb6b134c732
    container_name: duckdns
    network_mode: host
    environment:
    - PUID=1000
    - PGID=1000
    - TZ=Etc/UTC
    - SUBDOMAINS=subdomain1,subdomain2
    - TOKEN=token
    - UPDATE_IP=ipv6
    - LOG_FILE=false
    volumes:
    - /DATA/AppData/duckdns:/config
    restart: unless-stopped
x-casaos:
  main: duckdns
  icon: https://cdn.jsdelivr.net/gh/jerrykuku/ZimaOS-AppStore@gh-pages/apps/duckdns/assets/icon.svg
  title: duckdns
  index: /
  version: latest
