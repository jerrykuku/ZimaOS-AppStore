name: gateway-go
services:
  gateway-go:
    image: openiothub/gateway-go:v2.0.11
    network_mode: host
    deploy:
      resources:
        reservations:
          memory: 32M
    labels:
      icon: https://cdn.jsdelivr.net/gh/IceWhaleTech/CasaOS-AppStore@main/Apps/Gateway-go/icon.png
    restart: unless-stopped
    volumes:
    - type: bind
      source: /DATA/AppData/$AppID/config
      target: /root
    ports:
    - target: 34323
      published: '34323'
      protocol: tcp
    container_name: gateway-go
x-casaos:
  icon: https://cdn.jsdelivr.net/gh/IceWhaleTech/CasaOS-AppStore@main/Apps/Gateway-go/icon.png
  main: gateway-go
  port_map: '34323'
  scheme: http
  title:
    en_US: gateway-go
