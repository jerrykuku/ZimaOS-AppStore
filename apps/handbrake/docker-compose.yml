name: handbrake
services:
  handbrake:
    image: jlesage/handbrake:v25.10.1
    network_mode: bridge
    ports:
    - target: 5800
      published: '5800'
      protocol: tcp
    privileged: true
    restart: unless-stopped
    volumes:
    - type: bind
      source: /DATA
      target: /storage
    - type: bind
      source: /DATA/AppData/$AppID/watch
      target: /watch
    - type: bind
      source: /DATA/Media
      target: /output
    - type: bind
      source: /DATA/AppData/$AppID/config
      target: /config
    container_name: handbrake
x-casaos:
  icon: https://cdn.jsdelivr.net/gh/IceWhaleTech/CasaOS-AppStore@main/Apps/Handbrake/icon.png
  index: /
  port_map: '5800'
  scheme: http
  title:
    en_US: handbrake
