name: homebridge
version: '2'
services:
  homebridge:
    image: homebridge/homebridge@sha256:fd937bf36f4b49e88fb539b0ea705a047affba5a6655862df275454c76914c12
    restart: always
    network_mode: host
    volumes:
    - /DATA/AppData/$AppID/config:/homebridge
    logging:
      driver: json-file
      options:
        max-size: 10mb
        max-file: '1'
x-casaos:
  main: homebridge
  icon: https://cdn.jsdelivr.net/gh/jerrykuku/ZimaOS-AppStore@gh-pages/apps/homebridge/assets/icon.svg
  title: Homebridge
  index: /
  port_map: '8581'
  version: latest
