name: index-tts
services:
  index-tts:
    image: icewhaletech/index-tts:2.0
    container_name: index-tts
    restart: unless-stopped
    ports:
    - target: 7860
      published: '17869'
      protocol: tcp
    deploy:
      resources:
        reservations:
          memory: 12G
x-casaos:
  title: Index-TTS
  main: index-tts
  port_map: '17869'
  index: /
  scheme: http
  icon: https://cdn.jsdelivr.net/gh/jerrykuku/ZimaOS-AppStore@gh-pages/apps/index-tts/assets/icon.svg
