name: langflow
services:
  langflow:
    container_name: langflow
    image: langflowai/langflow:1.5.0
    user: 0:0
    ports:
    - target: 7860
      published: '17860'
      protocol: tcp
    depends_on:
    - langflow-postgres
    networks:
    - langflow-net
    environment:
    - LANGFLOW_DATABASE_URL=postgresql://langflow:langflow@langflow-postgres:5432/langflow
    - LANGFLOW_CONFIG_DIR=/app/langflow
    volumes:
    - /DATA/AppData/$AppID/backend:/app/langflow
  langflow-postgres:
    container_name: langflow-postgress
    image: postgres:16
    environment:
    - POSTGRES_USER=langflow
    - POSTGRES_PASSWORD=langflow
    - POSTGRES_DB=langflow
    networks:
    - langflow-net
    volumes:
    - type: bind
      source: /DATA/AppData/$AppID/postgres
      target: /var/lib/postgresql/data
networks:
  langflow-net:
    driver: bridge
x-casaos:
  main: langflow
  icon: https://cdn.jsdelivr.net/gh/jerrykuku/ZimaOS-AppStore@gh-pages/apps/langflow/assets/icon.svg
  scheme: http
  port_map: '17860'
  index: /
  title: Langflow
  version: 1.5.0
