name: nextcloud
services:
  nextcloud:
    image: nextcloud:32.0
    deploy:
      resources:
        reservations:
          memory: 512M
    network_mode: bridge
    ports:
    - target: 80
      published: '10081'
      protocol: tcp
    - target: 443
      published: '10443'
      protocol: tcp
    restart: unless-stopped
    volumes:
    - type: bind
      source: /DATA/AppData/$AppID/var/www/html
      target: /var/www/html
    container_name: nextcloud
x-casaos:
  main: nextcloud
  icon: https://cdn.jsdelivr.net/gh/IceWhaleTech/CasaOS-AppStore@main/Apps/Nextcloud/icon.png
  title:
    en_US: Nextcloud
  index: /
  port_map: '10081'
