name: node-red
services:
  node-red:
    image: nodered/node-red:4.1.2
    deploy:
      resources:
        reservations:
          memory: 64M
    network_mode: host
    ports:
    - target: 1880
      published: '1880'
      protocol: tcp
    restart: always
    volumes:
    - type: bind
      source: /DATA/AppData/$AppID/data
      target: /data
    container_name: node-red
x-casaos:
  main: node-red
  icon: https://cdn.jsdelivr.net/gh/IceWhaleTech/CasaOS-AppStore@main/Apps/Node-RED/icon.png
  title:
    en_US: Node-RED
  index: /
  port_map: '1880'
