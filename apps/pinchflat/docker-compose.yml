name: pinchflat
services:
  pinchflat:
    image: ghcr.io/kieraneglin/pinchflat:latest
    deploy:
      resources:
        reservations:
          memory: 256M
    network_mode: bridge
    ports:
    - target: 8945
      published: '8945'
      protocol: tcp
    restart: unless-stopped
    environment:
    - TZ=$TZ
    - PUID=$PUID
    - PGID=$PGID
    volumes:
    - type: bind
      source: /DATA/AppData/$AppID/config
      target: /config
    - type: bind
      source: /DATA/Media/Downloads
      target: /downloads
    container_name: pinchflat
x-casaos:
  icon: https://cdn.jsdelivr.net/gh/IceWhaleTech/CasaOS-AppStore@main/Apps/Pinchflat/icon.png
  main: pinchflat
  port_map: '8945'
  scheme: http
  title:
    en_US: Pinchflat
