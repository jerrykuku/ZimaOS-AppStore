name: sonarr
services:
  sonarr:
    environment:
      PGID: $PGID
      PUID: $PUID
      TZ: $TZ
    image: linuxserver/sonarr:4.0.15
    deploy:
      resources:
        reservations:
          memory: 256M
    network_mode: bridge
    ports:
    - target: 8989
      published: '8989'
      protocol: tcp
    restart: unless-stopped
    volumes:
    - type: bind
      source: /DATA/AppData/$AppID/config
      target: /config
    - type: bind
      source: /DATA/Media/TV Shows
      target: /tv
    - type: bind
      source: /DATA/Downloads
      target: /downloads
    container_name: sonarr
x-casaos:
  main: sonarr
  icon: https://cdn.jsdelivr.net/gh/jerrykuku/ZimaOS-AppStore@gh-pages/apps/sonarr/icon.svg
  title:
    en_US: Sonarr
  index: /
  port_map: '8989'
