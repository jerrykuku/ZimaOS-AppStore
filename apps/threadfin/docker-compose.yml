name: threadfin
services:
  threadfin:
    image: fyb3roptik/threadfin@sha256:863fb0c2945617b4aa48b79eaa655954df72d68fbee6e49a1465934ceb3f057e
    restart: unless-stopped
    environment:
    - THREADFIN_BRANCH=main
    - THREADFIN_DEBUG=0
    ports:
    - target: 34400
      published: '34400'
      protocol: tcp
    volumes:
    - type: bind
      source: /DATA/AppData/threadfin/config
      target: /home/threadfin/conf/data
    - type: bind
      source: /DATA/AppData/threadfin/backup
      target: /home/threadfin/conf/backup
    container_name: threadfin
x-casaos:
  main: threadfin
  icon: https://cdn.jsdelivr.net/gh/jerrykuku/ZimaOS-AppStore@gh-pages/apps/threadfin/assets/icon.svg
  index: /web/
  port_map: '34400'
  scheme: http
  title: Threadfin
  version: latest
