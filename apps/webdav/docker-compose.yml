name: webdav
services:
  webdav:
    cpu_shares: 90
    command: []
    container_name: webdav
    deploy:
      resources:
        limits:
          memory: 15806M
    environment:
    - GID=1000
    - PASSWORD=casaos
    - TZ=Europe/Madrid
    - UDI=1000
    - USERNAME=casaos
    image: ugeek/webdav:amd64
    labels:
      icon: https://icon.casaos.io/main/all/webdav.png
    ports:
    - target: 80
      published: '5005'
      protocol: tcp
    restart: unless-stopped
    volumes:
    - type: bind
      source: /media/ZimaOS-HD/Media
      target: /media
    network_mode: bridge
    privileged: false
x-casaos:
  main: webdav
  icon: https://icon.casaos.io/main/all/webdav.png
  title:
    en_US: WebDAV
  index: /
  port_map: '5005'
