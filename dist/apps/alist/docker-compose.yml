name: alist
services:
  alist:
    image: xhofe/alist:v3.40.0
    deploy:
      resources:
        reservations:
          memory: 64M
    network_mode: bridge
    ports:
    - target: 5244
      published: '5244'
      protocol: tcp
    restart: unless-stopped
    volumes:
    - type: bind
      source: /DATA/AppData/$AppID/data
      target: /opt/alist/data
    container_name: alist
x-casaos:
  icon: /apps/alist/assets/icon.svg
  main: alist
  port_map: '5244'
  scheme: http
  title: Alist
  version: v3.40.0
