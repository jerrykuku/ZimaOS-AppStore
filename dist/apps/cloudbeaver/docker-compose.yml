version: '3.7'
name: cloudbeaver
services:
  cloudbeaver:
    container_name: cloudbeaver
    deploy:
      resources:
        reservations:
          memory: 256M
    image: dbeaver/cloudbeaver:26.0.5
    ports:
    - target: 8978
      published: '8978'
      protocol: tcp
    restart: unless-stopped
    volumes:
    - type: bind
      source: /DATA/AppData/$AppID/workspace
      target: /opt/cloudbeaver/workspace
    network_mode: bridge
    privileged: false
x-casaos:
  main: cloudbeaver
  icon: /apps/cloudbeaver/assets/icon.svg
  title: CloudBeaver
  index: /
  port_map: '8978'
  version: 26.0.5
