name: databag
services:
  databag:
    image: balzack/databag:0.1.18
    restart: unless-stopped
    ports:
    - target: 7000
      published: 7000
      protocol: tcp
    volumes:
    - type: bind
      source: /DATA/AppData/databag/data
      target: /var/lib/databag
    container_name: databag
x-casaos:
  main: databag
  icon: /apps/databag/assets/icon.svg
  title: Databag
  port_map: '7000'
  version: 0.1.18
