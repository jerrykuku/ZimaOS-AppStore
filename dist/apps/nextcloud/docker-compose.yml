name: nextcloud
services:
  nextcloud:
    image: nextcloud:33.0.3
    deploy:
      resources:
        reservations:
          memory: 512M
    network_mode: bridge
    ports:
    - target: 80
      published: '10081'
      protocol: tcp
    - target: 443
      published: '10443'
      protocol: tcp
    restart: unless-stopped
    volumes:
    - type: bind
      source: /DATA/AppData/$AppID/var/www/html
      target: /var/www/html
    container_name: nextcloud
x-casaos:
  main: nextcloud
  icon: /apps/nextcloud/assets/icon.svg
  title: Nextcloud
  index: /
  port_map: '10081'
  version: 33.0.3
