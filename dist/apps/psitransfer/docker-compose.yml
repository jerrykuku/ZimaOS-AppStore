name: psitransfer
services:
  psitransfer:
    image: psitrax/psitransfer:v2.4.1
    container_name: psitransfer
    ports:
    - target: '3000'
      published: '13001'
      protocol: tcp
    environment:
      PSITRANSFER_ADMIN_PASS: secret
    volumes:
    - type: bind
      source: /DATA/AppData/$AppID/data
      target: /data
    deploy:
      resources:
        reservations:
          memory: 256M
    restart: unless-stopped
x-casaos:
  title: PsiTransfer
  icon: /apps/psitransfer/assets/icon.png
  index: /
  main: psitransfer
  port_map: '13001'
  scheme: http
  version: v2.4.1
